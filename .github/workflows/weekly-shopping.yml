name: Weekly Shopping List

# Sends the week's shopping list to Telegram every Sunday so you can shop ahead.
# Uses the same secrets as the daily ping: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID.

on:
  schedule:
    # 16:00 UTC Sunday = ~5pm UK summer — good time to plan the week's shop.
    - cron: "0 16 * * 0"
  workflow_dispatch: {}   # run it on demand from the Actions tab

jobs:
  shopping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Send weekly shopping list
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PT_START_DATE: "2026-06-22"
        run: node scripts/shopping-list.js
