name: Daily PT Ping

# Sends today's workout + meal plan to your Telegram every morning.
# Requires two repo secrets: TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
# (Settings → Secrets and variables → Actions). See README for setup.

on:
  schedule:
    # 06:00 UTC = 7am UK summer time (BST). In winter it lands at 6am — tweak if you like.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you run it manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Send daily Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Edit this to the Monday you want Week 1 to begin:
          PT_START_DATE: "2026-06-22"
          # Your hosted web-app link (used in the message):
          APP_URL: "https://benwatson2000.github.io/personal-trainer/"
          # Workout style for the ping: "gym" or "home" (no-equipment variants):
          PT_MODE: "gym"
        run: node scripts/daily-ping.js
